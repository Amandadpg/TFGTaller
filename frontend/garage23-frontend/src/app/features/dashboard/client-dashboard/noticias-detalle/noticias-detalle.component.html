<main class="w-full min-h-screen bg-[#050505] pt-32 pb-20 px-6 font-sans text-white relative">

    <div class="max-w-4xl mx-auto relative z-10 animate-fade-in" *ngIf="noticia">

        <a routerLink="/noticias"
            class="text-zinc-500 hover:text-pink-600 text-[10px] font-black uppercase tracking-widest mb-10 inline-flex items-center gap-2 transition-colors">
            ← Volver a noticias
        </a>

        <header class="mb-12 text-center md:text-left">
            <span class="text-pink-600 text-[10px] font-black uppercase tracking-[0.3em] block mb-4">{{
                noticia.categoria }}</span>
            <h1 class="text-4xl md:text-5xl lg:text-6xl font-black uppercase tracking-tighter leading-tight mb-6">
                {{ noticia.titulo }}
            </h1>
            <time class="text-zinc-500 font-mono text-xs uppercase tracking-widest block">{{ noticia.fecha }}</time>
        </header>

        <div
            class="w-full max-w-3xl mx-auto h-[250px] md:h-[300px] rounded-3xl overflow-hidden mb-12 border border-white/5 shadow-xl relative">
            <div class="absolute inset-0 bg-black/20 z-10 pointer-events-none"></div>
            <img [src]="noticia.imagen" class="w-full h-full object-cover object-center relative z-0">
        </div>

        <div class="bg-zinc-900/20 border border-white/5 p-8 md:p-12 rounded-3xl backdrop-blur-xl">
            <p *ngFor="let parrafo of noticia.cuerpo; let i = index"
                class="text-zinc-300 text-lg leading-relaxed font-light mb-6"
                [ngClass]="{'first-letter:text-6xl first-letter:font-black first-letter:text-pink-600 first-letter:mr-3 first-letter:float-left': i === 0}">
                {{ parrafo }}
            </p>
        </div>

    </div>

    <div class="text-center py-20" *ngIf="!noticia">
        <h2 class="text-2xl font-black uppercase">Noticia no encontrada</h2>
        <a routerLink="/noticias"
            class="text-pink-600 uppercase text-xs font-bold mt-4 inline-block hover:underline">Volver a inicio</a>
    </div>

</main>
