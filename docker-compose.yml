services:
  db:
    image: mariadb:11
    environment:
      MYSQL_ROOT_PASSWORD: secreta
      MYSQL_DATABASE: garage23
      MYSQL_USER: root
      MYSQL_PASSWORD: secreta
    ports:
      - "3307:3306"
    volumes:
      - dbdata:/var/lib/mysql/data
    restart: always

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    links:
      - db
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_ARBITRARY: 1
      MYSQL_ROOT_PASSWORD: secreta
    restart: always
    ports:
      - 8091:80
    depends_on:
      - db

  backend:
    build: ./backend/garage23
    restart: always
    environment:
      PERFIL_ACTIVO: prod
      SPRING_PROFILES_ACTIVE: prod
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MariaDBDialect
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: org.mariadb.jdbc.Driver
      SPRING_DATASOURCE_URL: jdbc:mariadb://db:3306/garage23?createDatabaseIfNotExist=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: secreta
      FRONTEND_URL: http://178.105.154.46
    ports:
      - "8080:8081"
    depends_on:
      - db

  frontend:
    build: ./frontend/garage23-frontend
    restart: always
    environment:
      # Si usas ngx-env o similar para parametrizar el frontend
      API_URL: http://178.105.154.46:8080/garage23
    ports:
      - "80:80"
    depends_on:
      - backend
volumes:
  dbdata: